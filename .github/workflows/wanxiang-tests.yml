name: WANXIANG tests

# 独立的 wanxiang 测试 CI（无密钥要求；上游 OASIS 的 python-app.yml 仍保留）。

"on":
  push:
    branches: ["**"]
    paths:
      - "wanxiang/**"
      - "engine/**"
      - "test/wanxiang/**"
      - ".github/workflows/wanxiang-tests.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "wanxiang/**"
      - "engine/**"
      - "test/wanxiang/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install wanxiang runtime + test deps
        # 不装 camel-ai 的所有大件依赖（torch/sentence-transformers）：
        # wanxiang/engine 测试只需 fastapi + pydantic + pyyaml + pytest + httpx + camel-ai 本身。
        # camel-ai 会按 setup.py 拉 numpy/openai/sse-starlette 等核心，但不强拉 torch。
        # 若个别测试需要 OASIS 大件，CI 不跑那部分（test/infra/ 不在 test/wanxiang/ 路径）。
        run: |
          python -m pip install --upgrade pip
          pip install \
            "camel-ai==0.2.78" \
            "fastapi>=0.110" \
            "uvicorn[standard]==0.49.0" \
            pydantic==2.13.4 \
            pydantic-settings==2.14.1 \
            pyyaml==6.0.3 \
            pytest==8.2.0 \
            pytest-asyncio==0.23.6 \
            httpx

      - name: Run wanxiang tests
        # 只跑 test/wanxiang/ 子树，避免上游 OASIS 的 LLM/API key 依赖。
        run: |
          pytest test/wanxiang/ -v --tb=short

      - name: Show coverage summary (optional)
        if: always()
        run: |
          pytest test/wanxiang/ -q --co 2>&1 | tail -5 || true
