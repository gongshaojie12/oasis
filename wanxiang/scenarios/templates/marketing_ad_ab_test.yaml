id: marketing_ad_ab_test
name:
  zh: 营销预测 · 广告创意 A/B
  en: Marketing Forecast · Ad Creative A/B
description:
  zh: 给出一个广告创意/卖点文案，估群体购买意愿评分（0-10）。
  en: Given an ad creative or selling-point copy, estimate the group's purchase-intent score (0-10).
decision_kind: rate
material_template:
  zh: |
    广告创意：{ad_copy}

    品牌：{brand}
    产品：{product_name}（{category}）
    定价：¥{price}
    投放渠道：{channel}
  en: |
    Ad creative: {ad_copy}

    Brand: {brand}
    Product: {product_name} ({category})
    Price: ¥{price}
    Channel: {channel}
question_template:
  zh: |
    看完这条广告，请给出你的购买意愿评分（0=完全不会买，10=肯定会买）。
  en: |
    After seeing this ad, please rate your purchase intent (0 = definitely won't buy, 10 = definitely will buy).
variables:
  - name: brand
    label:
      zh: 品牌名
      en: Brand
    type: text
    required: true
  - name: product_name
    label:
      zh: 产品名
      en: Product name
    type: text
    required: true
  - name: category
    label:
      zh: 品类
      en: Category
    type: text
    required: true
    default: 消费品
  - name: ad_copy
    label:
      zh: 广告文案 / 卖点
      en: Ad copy / selling point
    type: text
    required: true
  - name: price
    label:
      zh: 零售价（元）
      en: Retail price (CNY)
    type: number
    required: true
  - name: channel
    label:
      zh: 投放渠道
      en: Channel
    type: text
    required: false
    default: 抖音 / 小红书 信息流
