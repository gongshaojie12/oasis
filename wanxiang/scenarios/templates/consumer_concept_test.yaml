id: consumer_concept_test
name:
  zh: 消费洞察 · 新品概念测试
  en: Consumer Insight · New Product Concept Test
description:
  zh: 测试人群对新品多个变体（口味/包装/卖点等）的偏好排序。
  en: Test how a target audience ranks several variants of a new product (flavour, packaging, value-prop, etc.).
decision_kind: choose
material_template:
  zh: |
    {brand} 即将推出 {category} 新品 「{product_name}」，零售价 ¥{price}。
    本次有 {variant_count} 个候选方向供你挑选，请基于个人偏好做出选择。
  en: |
    {brand} is about to launch a new {category} product called "{product_name}", retail price ¥{price}.
    You have {variant_count} candidate directions to choose from — please pick the one that best matches your personal preference.
question_template:
  zh: |
    作为目标人群成员，你最想买哪一个？只能选一个。
  en: |
    As a member of the target audience, which one would you most want to buy? Pick exactly one.
variables:
  - name: brand
    label:
      zh: 品牌名
      en: Brand
    type: text
    required: true
  - name: category
    label:
      zh: 品类
      en: Category
    type: text
    required: true
    default: 饮品
  - name: product_name
    label:
      zh: 产品名
      en: Product name
    type: text
    required: true
  - name: price
    label:
      zh: 零售价（元）
      en: Retail price (CNY)
    type: number
    required: true
  - name: variant_count
    label:
      zh: 候选数量
      en: Number of candidates
    type: number
    required: false
    default: 3
default_options:
  zh:
    - 青提
    - 白桃
    - 海盐荔枝
  en:
    - Green Grape
    - White Peach
    - Sea-Salt Lychee
