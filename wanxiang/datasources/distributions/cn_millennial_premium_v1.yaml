# 中国千禧一代中产消费力示例分布（v1） — spec §M1 缺口#4 多源数据。
# 目标人群：1980-1994 年生，城市 1-2 线居多，高教育，已婚有子，购买力强。
# 来源：粗略匹配国家统计局、CNNIC、QuestMobile、艾瑞、Kantar、贝恩中国奢侈品报告
# 等公开口径；仅用于 MVP 演示与离线模拟，不可作为商业决策依据。
#
# 数值维 (0-1) 统一按 5-9 个桶离散化；
# 小时类按 0.0 / 0.5 / 1.0 / 2.0 / 3.0 / 5.0 离散；
# 权重无需归一，PersonaBuilder 按比例抽样。
#
# 维度统计：demographic ~30 + personality ~30 + media ~25 = 85+
